services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SANDBOX_APPROVAL_SECRET=${SANDBOX_APPROVAL_SECRET:-agent-sandbox-hmac-secret-change-me}
    volumes:
      - db-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
